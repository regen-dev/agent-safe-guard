name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  linux-native:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq cmake g++ make

      - name: Configure
        run: cmake -S . -B build/native -DSG_BUILD_NATIVE=ON

      - name: Build
        run: cmake --build build/native -j2

      - name: Test suite
        run: make test

      - name: Native smoke
        run: make test-native-pre-smoke

      - name: Native rule audit
        run: make test-native-rule-audit
